<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JamSync – Sala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      JamSync
    </div>

    <div class="sala-info">
      <span class="sala-badge">Sala</span>
      <span class="sala-nombre" id="display-nombre-sala">–</span>
      <span class="sala-codigo" id="display-codigo-sala" title="Clic para copiar">–</span>
    </div>

    <div class="header-actions">
      <div class="avatar-stack" id="avatar-stack"></div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <!-- Video -->
    <div class="video-wrapper" id="video-wrapper">
      <!-- Pantalla vacía -->
      <div id="pantalla-vacia" style="display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--muted);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <span style="font-size:13px;">Buscá un video y agregalo a la cola</span>
      </div>

      <!-- Overlay "Now playing" -->
      <div class="now-playing-bar" id="now-playing-bar" style="display:none;">
        <div class="now-playing-badge">
          <div class="np-dot"></div>
          En reproducción
        </div>
        <div class="now-playing-title" id="np-titulo">–</div>
      </div>

      <!-- iFrame de YouTube (oculto, se muestra al cargar video) -->
      <div id="yt-player" style="position:absolute;inset:0;width:100%;height:100%;display:none;"></div>
    </div>

    <!-- Controles -->
    <div class="player-controls">
      <div class="progress-area">
        <span class="time-label" id="time-current">0:00</span>
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>

      <div class="controls-row">
        <button class="ctrl-btn" id="btn-prev" title="Anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>

        <button class="ctrl-btn play" id="btn-play" title="Play / Pause">
          <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <button class="ctrl-btn" id="btn-next" title="Siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>

        <div class="volume-group">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="var(--muted2)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12z"/></svg>
          <input type="range" id="volume-slider" min="0" max="100" value="80">
        </div>

        <div class="sync-status">
          <div class="sync-dot"></div>
          Sincronizado
        </div>
      </div>
    </div>
  </main>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" data-tab="buscar">Buscar</div>
      <div class="tab" data-tab="cola">Cola</div>
      <div class="tab" data-tab="chat">Chat</div>
    </div>

    <!-- Tab: Buscar -->
    <div class="tab-content active" id="tab-buscar">
      <div class="search-area">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="input-buscar" placeholder="Buscar en YouTube…">
          <button id="btn-buscar" style="background:none;border:none;color:var(--accent2);font-size:12px;padding:0 2px;white-space:nowrap;">
            Buscar
          </button>
        </div>
      </div>
      <div class="results-list" id="results-list">
        <div style="padding:24px 14px; text-align:center; color:var(--muted); font-size:12px;">
          Buscá un artista, canción o álbum
        </div>
      </div>
    </div>

    <!-- Tab: Cola -->
    <div class="tab-content" id="tab-cola">
      <div class="cola-header">
        <span class="cola-title">Cola de reproducción</span>
        <span class="cola-count" id="cola-count">0 videos</span>
      </div>
      <div class="cola-list" id="cola-list">
        <div style="padding:24px 14px; text-align:center; color:var(--muted); font-size:12px;" id="cola-vacia">
          La cola está vacía
        </div>
      </div>
    </div>

    <!-- Tab: Chat -->
    <div class="tab-content" id="tab-chat">
      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <div class="emoji-row">
          <button class="emoji-btn" data-emoji="🔥">🔥</button>
          <button class="emoji-btn" data-emoji="🎵">🎵</button>
          <button class="emoji-btn" data-emoji="😂">😂</button>
          <button class="emoji-btn" data-emoji="❤️">❤️</button>
          <button class="emoji-btn" data-emoji="👏">👏</button>
        </div>
        <div class="chat-input-box">
          <input type="text" id="chat-input" placeholder="Escribí algo…" maxlength="200">
          <button class="send-btn" id="btn-enviar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </aside>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="js/sala.js"></script>
</body>
</html>
